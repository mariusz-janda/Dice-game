<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Dice Game</title>
    <link rel="stylesheet" href="GraKostka.css">
</head>
<body>

<div class="container">
    <h1>🎲 Dice Game</h1>

    <div id="message" class="message"></div>

    <div class="dice" id="dice">1</div>

    <button id="rollBtn">Rzuć kostką</button>

    <p><strong>Historia rzutów:</strong></p>
    <div id="history"></div>

    <p id="playerScore">Gracz: 0</p>
    <p id="computerScore">Komputer: 0</p>
    <p id="total">Suma: 0</p>

    <button id="resetBtn" class="hidden">Reset</button>
</div>

<script src="GraKostka.js"></script>
</body>
</html>
